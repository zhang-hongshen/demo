<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>课堂方案工作台</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="功能导航">
        <div class="brand-lockup">
          <span class="brand-icon" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">课堂方案</p>
            <h1>教学设计工作台</h1>
          </div>
        </div>

        <nav class="tabs feature-tabs" aria-label="功能选择">
          <button class="tab active" type="button" data-feature="slides">课件生成</button>
          <button class="tab" type="button" data-feature="grading">作业批改</button>
          <button class="tab" type="button" data-feature="analysis">学情分析</button>
        </nav>

        <button id="workspace-button" class="workspace-button" type="button">
          <span class="workspace-button-icon" aria-hidden="true"></span>
          课程空间
        </button>

        <div class="sidebar-tools">
          <button id="templates-button" class="sidebar-tool-button" type="button">
            <span class="sidebar-tool-icon template-tool-icon" aria-hidden="true"></span>
            教学模板
          </button>
          <button id="checklist-button" class="sidebar-tool-button" type="button">
            <span class="sidebar-tool-icon checklist-tool-icon" aria-hidden="true"></span>
            备课清单
          </button>
          <button id="classroom-assistant-button" class="sidebar-tool-button" type="button">
            <span class="sidebar-tool-icon timer-tool-icon" aria-hidden="true"></span>
            课堂助手
          </button>
          <button id="reflection-button" class="sidebar-tool-button" type="button">
            <span class="sidebar-tool-icon reflection-tool-icon" aria-hidden="true"></span>
            课后复盘
          </button>
        </div>

        <div id="status" class="status">准备就绪</div>
      </aside>

      <section class="workspace" aria-label="课堂方案工作台">
        <aside class="input-panel">
          <div class="panel-heading">
            <h2>输入信息</h2>
          </div>

          <form id="request-form" class="request-form">
            <input id="feature-input" name="feature" type="hidden" value="slides">

            <div class="feature-panel" data-feature-panel="slides">
              <label>
                <span>课程名称</span>
                <input name="course" value="数据结构" autocomplete="off">
              </label>

              <label>
                <span>本节主题</span>
                <input name="topic" value="二叉树遍历" autocomplete="off">
              </label>

              <label>
                <span>教学目标</span>
                <textarea name="objectives" rows="3">掌握三种遍历规则，能根据样例树写出遍历序列，并解释递归边界。</textarea>
              </label>

              <div class="form-grid">
                <label>
                  <span>课堂时长</span>
                  <input name="duration" value="45分钟" autocomplete="off">
                </label>
                <label>
                  <span>输出风格</span>
                  <select name="outputStyle">
                    <option>竞标答辩演示</option>
                    <option>校方领导汇报</option>
                    <option>教师备课助手</option>
                  </select>
                </label>
              </div>
            </div>

            <div class="feature-panel" data-feature-panel="grading" hidden>
              <label>
                <span>作业名称</span>
                <input name="assignmentTitle" value="二叉树遍历练习" autocomplete="off">
              </label>

              <label>
                <span>作业要求</span>
                <textarea name="assignmentRequirement" rows="3">写出给定二叉树的前序、中序、后序遍历序列，并说明递归边界。</textarea>
              </label>

              <label>
                <span>评分标准</span>
                <textarea name="gradingRubric" rows="3">遍历序列60分，递归过程解释30分，书写规范10分。</textarea>
              </label>

              <label>
                <span>学生提交</span>
                <textarea name="studentSubmission" rows="5">前序：A B D E C；中序：D B E A C；后序：D E B C A。递归结束条件为空节点。</textarea>
              </label>
            </div>

            <div class="feature-panel" data-feature-panel="analysis" hidden>
              <label>
                <span>班级画像</span>
                <textarea name="classProfile" rows="4">软件工程大二，48人；约三分之一学生递归基础薄弱，课堂练习提交速度差异明显。</textarea>
              </label>

              <label>
                <span>学生痛点</span>
                <textarea name="painPoints" rows="4">容易混淆前序、中序、后序；只会背顺序，不理解递归调用过程。</textarea>
              </label>
            </div>

            <div class="material-card">
              <label class="material-upload" for="materials">
                <span class="material-label">补充材料</span>
                <input id="materials" class="material-input" name="materials" type="file" multiple accept=".txt,.md,.csv,.json,.log,.pdf,.doc,.docx,.ppt,.pptx,text/plain,text/markdown,text/csv,application/json,application/pdf">
                <span class="material-drop">
                  <span class="material-icon" aria-hidden="true"></span>
                  <span>
                    <strong>选择资料</strong>
                    <small>支持常用课程文件</small>
                  </span>
                </span>
              </label>
              <div id="material-summary" class="material-summary">暂未加入材料</div>
            </div>

            <div class="button-row">
              <button id="generate-button" class="primary-button" type="submit">
                <span class="button-icon" aria-hidden="true"></span>
                生成课件
              </button>
              <button id="sample-button" class="secondary-button" type="button">查看样例</button>
              <button id="save-workspace-button" class="secondary-button" type="button">保存课程</button>
            </div>
          </form>
        </aside>

        <section class="output-panel" aria-live="polite">
          <div class="output-header">
            <div class="output-title-group">
              <h2>生成结果</h2>
              <span id="output-title">课件生成</span>
            </div>
            <div class="export-actions" aria-label="导出操作">
              <button id="copy-result-button" class="export-button" type="button" disabled>复制当前页</button>
              <div class="export-menu-wrap">
                <button id="export-button" class="export-button" type="button" aria-haspopup="menu" aria-expanded="false" disabled>导出</button>
                <div id="export-menu" class="export-menu" role="menu" hidden>
                  <button type="button" role="menuitem" data-export-format="word">Word</button>
                  <button type="button" role="menuitem" data-export-format="pdf">PDF</button>
                  <button type="button" role="menuitem" data-export-format="ppt">PPT</button>
                </div>
              </div>
            </div>
          </div>

          <div id="result" class="result-surface">
            <div class="empty-state">
              <div class="empty-visual" aria-hidden="true"></div>
              <h3>暂无内容</h3>
              <p>填写信息后生成课堂方案。</p>
            </div>
          </div>
        </section>
      </section>
    </main>

    <div id="theme-dialog" class="modal-backdrop" hidden>
      <section class="theme-panel" role="dialog" aria-modal="true" aria-labelledby="theme-dialog-title">
        <div class="dialog-header">
          <h3 id="theme-dialog-title">选择主题</h3>
          <button id="theme-dialog-close" class="icon-button" type="button" aria-label="关闭"></button>
        </div>
        <div class="theme-grid" aria-label="主题选择">
          <button class="theme-card selected" type="button" data-theme-id="formal-blue" aria-pressed="true" style="--theme-accent:#0071e3; --theme-line:#d2d2d7; --theme-text:#1d1d1f;">
            <span class="theme-preview" aria-hidden="true"><span></span><span></span><span></span></span>
            <strong>正式蓝</strong>
          </button>
          <button class="theme-card" type="button" data-theme-id="academic-green" aria-pressed="false" style="--theme-accent:#0f7b5f; --theme-line:#cfe3dc; --theme-text:#18362b;">
            <span class="theme-preview" aria-hidden="true"><span></span><span></span><span></span></span>
            <strong>学术绿</strong>
          </button>
          <button class="theme-card" type="button" data-theme-id="minimal-mono" aria-pressed="false" style="--theme-accent:#1d1d1f; --theme-line:#d2d2d7; --theme-text:#1d1d1f;">
            <span class="theme-preview" aria-hidden="true"><span></span><span></span><span></span></span>
            <strong>极简黑白</strong>
          </button>
          <button class="theme-card" type="button" data-theme-id="vitality-orange" aria-pressed="false" style="--theme-accent:#f97316; --theme-line:#f2d1ba; --theme-text:#2b2118;">
            <span class="theme-preview" aria-hidden="true"><span></span><span></span><span></span></span>
            <strong>活力橙</strong>
          </button>
          <button class="theme-card" type="button" data-theme-id="mobile-blue" aria-pressed="false" style="--theme-accent:#0086d1; --theme-line:#c9e4f4; --theme-text:#1d1d1f;">
            <span class="theme-preview" aria-hidden="true"><span></span><span></span><span></span></span>
            <strong>移动蓝</strong>
          </button>
        </div>
      </section>
    </div>

    <div id="workspace-dialog" class="modal-backdrop" hidden>
      <section class="workspace-panel" role="dialog" aria-modal="true" aria-labelledby="workspace-dialog-title">
        <div class="dialog-header">
          <div>
            <h3 id="workspace-dialog-title">课程空间</h3>
            <p class="dialog-subtitle">保存课程输入、生成结果和历史版本</p>
          </div>
          <button id="workspace-dialog-close" class="icon-button" type="button" aria-label="关闭"></button>
        </div>
        <div class="workspace-toolbar">
          <span id="workspace-count" class="workspace-count">暂无保存课程</span>
          <div class="workspace-toolbar-actions">
            <label class="workspace-search">
              <span class="sr-only">搜索课程</span>
              <input id="workspace-search" type="search" placeholder="搜索课程或主题" autocomplete="off">
            </label>
            <button id="new-workspace-button" class="secondary-button" type="button">新建课程</button>
          </div>
        </div>
        <div id="workspace-list" class="workspace-list"></div>
      </section>
    </div>

    <div id="templates-dialog" class="modal-backdrop" hidden>
      <section class="templates-panel" role="dialog" aria-modal="true" aria-labelledby="templates-dialog-title">
        <div class="dialog-header">
          <div>
            <h3 id="templates-dialog-title">教学模板</h3>
            <p class="dialog-subtitle">按当前功能套用一组可直接修改的备课起点</p>
          </div>
          <button id="templates-dialog-close" class="icon-button" type="button" aria-label="关闭"></button>
        </div>
        <div id="template-list" class="template-list"></div>
      </section>
    </div>

    <div id="checklist-dialog" class="modal-backdrop" hidden>
      <section class="checklist-panel" role="dialog" aria-modal="true" aria-labelledby="checklist-dialog-title">
        <div class="dialog-header">
          <div>
            <h3 id="checklist-dialog-title">备课清单</h3>
            <p class="dialog-subtitle">把生成内容变成课前真正要完成的动作</p>
          </div>
          <button id="checklist-dialog-close" class="icon-button" type="button" aria-label="关闭"></button>
        </div>
        <div class="checklist-summary">
          <div>
            <strong id="checklist-progress">0 / 5</strong>
            <span>项已完成</span>
          </div>
          <div class="checklist-progress-track" aria-hidden="true"><span id="checklist-progress-bar"></span></div>
        </div>
        <div id="checklist-list" class="checklist-list"></div>
      </section>
    </div>

    <div id="classroom-assistant-dialog" class="modal-backdrop" hidden>
      <section class="classroom-assistant-panel" role="dialog" aria-modal="true" aria-labelledby="classroom-assistant-title">
        <div class="dialog-header">
          <div>
            <h3 id="classroom-assistant-title">课堂助手</h3>
            <p class="dialog-subtitle">上课时快速控制节奏，并随时拿到一个可追问的问题</p>
          </div>
          <button id="classroom-assistant-close" class="icon-button" type="button" aria-label="关闭"></button>
        </div>
        <div class="classroom-assistant-body">
          <section class="timer-section" aria-labelledby="timer-title">
            <div class="assistant-section-heading">
              <h4 id="timer-title">课堂计时</h4>
              <span id="timer-status" class="timer-status">未开始</span>
            </div>
            <div id="timer-display" class="timer-display" aria-live="polite">45:00</div>
            <div class="timer-presets" aria-label="计时预设">
              <button type="button" data-timer-seconds="300">5 分钟</button>
              <button type="button" data-timer-seconds="900">15 分钟</button>
              <button type="button" data-timer-seconds="1800">30 分钟</button>
              <button class="selected" type="button" data-timer-seconds="2700">45 分钟</button>
              <button type="button" data-timer-seconds="5400">90 分钟</button>
            </div>
            <div class="timer-actions">
              <button id="timer-toggle-button" class="primary-button" type="button">开始</button>
              <button id="timer-reset-button" class="secondary-button" type="button">重置</button>
            </div>
          </section>

          <section class="prompt-section" aria-labelledby="prompt-title">
            <div class="assistant-section-heading">
              <h4 id="prompt-title">课堂提问卡</h4>
              <span id="prompt-index" class="timer-status">1 / 1</span>
            </div>
            <p id="classroom-prompt" class="classroom-prompt">先让学生说出这一步的判断依据，再请另一位同学补充一个反例。</p>
            <div class="prompt-actions">
              <button id="next-prompt-button" class="secondary-button" type="button">下一个问题</button>
              <button id="copy-prompt-button" class="secondary-button" type="button">复制问题</button>
            </div>
          </section>
        </div>
      </section>
    </div>

    <div id="reflection-dialog" class="modal-backdrop" hidden>
      <section class="reflection-panel" role="dialog" aria-modal="true" aria-labelledby="reflection-title">
        <div class="dialog-header">
          <div>
            <h3 id="reflection-title">课后复盘</h3>
            <p class="dialog-subtitle">记录一次课堂，下一次备课会更快</p>
          </div>
          <button id="reflection-close" class="icon-button" type="button" aria-label="关闭"></button>
        </div>
        <form id="reflection-form" class="reflection-form">
          <label>
            <span>课堂表现</span>
            <textarea id="lesson-reflection" name="lessonReflection" rows="4" placeholder="哪些环节按计划完成了？哪里超时或卡住了？"></textarea>
          </label>
          <label>
            <span>学生反馈</span>
            <textarea id="student-feedback" name="studentFeedback" rows="4" placeholder="学生在哪些地方最投入，哪些地方仍然困惑？"></textarea>
          </label>
          <label>
            <span>下次调整</span>
            <textarea id="next-adjustment" name="nextAdjustment" rows="4" placeholder="下次准备保留、删减或重新设计什么？"></textarea>
          </label>
          <div class="reflection-actions">
            <span id="reflection-updated" class="reflection-updated">尚未保存</span>
            <button class="primary-button" type="submit">保存复盘</button>
          </div>
        </form>
      </section>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
