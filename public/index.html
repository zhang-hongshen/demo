<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>课堂方案工作台</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar" aria-label="页面概览">
        <div>
          <p class="eyebrow">课堂方案</p>
          <h1>教学设计工作台</h1>
        </div>
        <div id="status" class="status">准备就绪</div>
      </header>

      <section class="workspace" aria-label="课堂方案工作台">
        <aside class="input-panel">
          <div class="panel-heading">
            <h2>输入信息</h2>
          </div>

          <form id="request-form" class="request-form">
            <label>
              <span>课程名称</span>
              <input name="course" value="数据结构" autocomplete="off">
            </label>

            <label>
              <span>本节主题</span>
              <input name="topic" value="二叉树遍历" autocomplete="off">
            </label>

            <label>
              <span>班级画像</span>
              <textarea name="classProfile" rows="3">软件工程大二，48人；约三分之一学生递归基础薄弱，课堂练习提交速度差异明显。</textarea>
            </label>

            <label>
              <span>学生痛点</span>
              <textarea name="painPoints" rows="3">容易混淆前序、中序、后序；只会背顺序，不理解递归调用过程。</textarea>
            </label>

            <label>
              <span>教学目标</span>
              <textarea name="objectives" rows="3">掌握三种遍历规则，能根据样例树写出遍历序列，并解释递归边界。</textarea>
            </label>

            <div class="material-card">
              <label class="material-upload" for="materials">
                <span class="material-label">补充材料</span>
                <input id="materials" class="material-input" name="materials" type="file" multiple accept=".txt,.md,.csv,.json,.log,.pdf,.doc,.docx,.ppt,.pptx,text/plain,text/markdown,text/csv,application/json,application/pdf">
                <span class="material-drop">
                  <span class="material-icon" aria-hidden="true"></span>
                  <span>
                    <strong>选择资料</strong>
                    <small>支持常用课程文件</small>
                  </span>
                </span>
              </label>
              <div id="material-summary" class="material-summary">暂未加入材料</div>
            </div>

            <div class="form-grid">
              <label>
                <span>课堂时长</span>
                <input name="duration" value="45分钟" autocomplete="off">
              </label>
              <label>
                <span>输出风格</span>
                <select name="outputStyle">
                  <option>竞标答辩演示</option>
                  <option>校方领导汇报</option>
                  <option>教师备课助手</option>
                </select>
              </label>
            </div>

            <div class="button-row">
              <button id="generate-button" class="primary-button" type="submit">
                <span class="button-icon" aria-hidden="true"></span>
                生成课堂方案
              </button>
              <button id="sample-button" class="secondary-button" type="button">查看样例</button>
            </div>
          </form>
        </aside>

        <section class="output-panel" aria-live="polite">
          <div class="output-header">
            <h2>生成结果</h2>
            <div class="export-actions" aria-label="导出操作">
              <button id="export-word" class="export-button" type="button" disabled>导出 Word</button>
              <button id="export-pdf" class="export-button" type="button" disabled>导出 PDF</button>
            </div>
          </div>

          <nav class="tabs" aria-label="结果分类">
            <button class="tab active" type="button" data-tab="teachingPlan">教案</button>
            <button class="tab" type="button" data-tab="slideOutline">课件</button>
            <button class="tab" type="button" data-tab="quiz">测验</button>
            <button class="tab" type="button" data-tab="learningAnalysis">学情分析</button>
            <button class="tab" type="button" data-tab="pitchScript">演示稿</button>
          </nav>

          <div id="result" class="result-surface">
            <div class="empty-state">
              <div class="empty-visual" aria-hidden="true"></div>
              <h3>暂无内容</h3>
              <p>填写信息后生成课堂方案。</p>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
